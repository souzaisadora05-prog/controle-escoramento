<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Escoramento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --ink:#0f1117;--ink-mid:#2d3142;--ink-soft:#6b7280;
  --rule:#e5e7eb;--rule-lt:#f3f4f6;--white:#fff;
  --accent:#1d4ed8;--accent-lt:#eff6ff;
  --amber:#b45309;--amber-lt:#fffbeb;
  --green:#15803d;--green-lt:#f0fdf4;
  --red:#b91c1c;--red-lt:#fef2f2;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#f8f9fb;color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}

/* TOPBAR */
.topbar{background:var(--ink);color:#fff;height:52px;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:200}
.topbar-brand{font-family:var(--display);font-size:15px;font-weight:700}
.topbar-sep{flex:1}
.topbar-user{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5)}
.topbar-btn{font-family:var(--display);font-size:11px;font-weight:700;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 14px;border-radius:4px;cursor:pointer}
.topbar-btn:hover{background:rgba(255,255,255,.25)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--white);border:1px solid var(--rule);border-radius:10px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-title{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:2px}
.login-sub{font-size:12px;color:var(--ink-soft);margin-bottom:28px}

/* LAYOUT */
.app-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:var(--white);border-right:1px solid var(--rule);padding:16px 0}
.sb-obra{padding:12px 16px;border-bottom:1px solid var(--rule);margin-bottom:8px}
.sb-obra .lbl{font-family:var(--mono);font-size:9px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.8px}
.sb-obra .nm{font-family:var(--display);font-size:13px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-sec{padding:4px 16px;font-family:var(--mono);font-size:9px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--ink-mid);border-right:2px solid transparent;transition:all .12s;user-select:none;position:relative}
.sb-item:hover{background:var(--rule-lt)}
.sb-item.active{background:var(--accent-lt);color:var(--accent);border-right-color:var(--accent);font-weight:500}
.sb-item .ic{font-size:14px;width:18px;text-align:center}
.sb-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--accent);color:#fff;font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}
.content{padding:24px 28px 80px;overflow-y:auto;max-width:1100px}

/* STEP HEADER */
.step-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-family:var(--display);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-info .step-title{font-family:var(--display);font-size:20px;font-weight:700}
.step-info .step-sub{font-size:12px;color:var(--ink-soft)}

/* CARD */
.card{background:var(--white);border:1px solid var(--rule);border-radius:8px;margin-bottom:16px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--rule);background:#fafafa;display:flex;align-items:center;justify-content:space-between}
.card-head-title{font-family:var(--display);font-size:13px;font-weight:700}
.card-body{padding:16px}

/* FORM */
.fg{display:grid;gap:12px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:700px){.fg2,.fg3,.fg4{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.7px}
.field input,.field select{border:1px solid var(--rule);border-radius:5px;padding:8px 10px;font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--white);outline:none;transition:border .15s,box-shadow .15s}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.field input[type=number]{font-family:var(--mono)}
.field-hint{font-size:11px;color:var(--ink-soft);font-style:italic}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:5px;font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1e40af}
.btn-ghost{background:var(--white);color:var(--ink-mid);border:1px solid var(--rule)}.btn-ghost:hover{background:var(--rule-lt)}
.btn-danger{background:var(--red-lt);color:var(--red);border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
.btn-add{background:var(--accent-lt);color:var(--accent);border:1px dashed #bfdbfe}.btn-add:hover{background:#dbeafe}
.btn-success{background:var(--green-lt);color:var(--green);border:1px solid #bbf7d0}
.btn-sm{padding:4px 9px;font-size:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* OBRA LIST */
.obra-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.obra-card{background:var(--white);border:1px solid var(--rule);border-radius:8px;padding:16px;cursor:pointer;transition:all .15s}
.obra-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(29,78,216,.1)}
.obra-card-name{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:3px}
.obra-card-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.obra-card-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--rule-lt);display:flex;justify-content:space-between;align-items:center}

/* CHIPS */
.chip{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.chip-blue{background:#dbeafe;color:#1d4ed8}
.chip-green{background:#dcfce7;color:#15803d}
.chip-amber{background:#fef3c7;color:#b45309}
.chip-red{background:#fee2e2;color:#b91c1c}
.chip-gray{background:var(--rule-lt);color:var(--ink-soft)}

/* PAV ROW */
.pav-row{background:var(--white);border:1px solid var(--rule);border-radius:6px;margin-bottom:8px;overflow:hidden}
.pav-row-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.pav-row-head:hover{background:var(--rule-lt)}
.pav-row-body{padding:14px;border-top:1px solid var(--rule-lt)}
.pav-row-body.collapsed{display:none}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;background:#fafafa;border-bottom:1px solid var(--rule);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--rule-lt);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl td.num{text-align:right;font-family:var(--mono);font-size:12px}
.tbl td.mono{font-family:var(--mono);font-size:11px}
.tbl tfoot td{font-weight:700;background:#f8f9fb;border-top:2px solid var(--rule);font-family:var(--mono);font-size:11px;padding:8px 10px}
.tbl tfoot td.num{text-align:right}
.ii{border:1px solid transparent;border-radius:4px;padding:4px 6px;font-family:var(--mono);font-size:12px;width:100%;background:transparent;outline:none;transition:border .1s}
.ii:focus{border-color:var(--accent);background:var(--accent-lt)}
.ii-date{border:1px solid var(--rule);border-radius:4px;padding:4px 6px;font-family:var(--mono);font-size:11px;background:var(--white);outline:none;width:130px}
.ii-date:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,78,216,.1)}

/* CRONOGRAMA TABLE */
.crono-tbl{width:100%;border-collapse:collapse;font-size:12px}
.crono-tbl th{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;background:#fafafa;border-bottom:1px solid var(--rule);white-space:nowrap}
.crono-tbl td{padding:8px 10px;border-bottom:1px solid var(--rule-lt);vertical-align:middle}
.crono-tbl tr:hover td{background:var(--rule-lt)}
.crono-tbl td.num{text-align:right;font-family:var(--mono);font-size:11px}
.crono-tbl td.dt{font-family:var(--mono);font-size:11px;white-space:nowrap}
.crono-tbl td.nome{font-family:var(--display);font-size:13px;font-weight:700}

/* STATUS BARS */
.bar-esc{display:inline-block;background:#1d4ed8;color:#fff;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.bar-reesc{display:inline-block;background:#15803d;color:#fff;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.bar-reesc.alerta{background:#b91c1c}
.bar-aguard{display:inline-block;background:var(--rule);color:var(--ink-soft);font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}

/* ALERT */
.alert{border-radius:6px;padding:9px 12px;font-size:12px;margin-bottom:12px;display:flex;gap:8px;line-height:1.5}
.alert-info{background:var(--accent-lt);color:var(--accent);border:1px solid #bfdbfe}
.alert-amber{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.alert-red{background:var(--red-lt);color:var(--red);border:1px solid #fecaca}
.alert-green{background:var(--green-lt);color:var(--green);border:1px solid #bbf7d0}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--ink);color:#fff;padding:11px 16px;border-radius:7px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#14532d;border-left:3px solid #22c55e}
.toast.error{background:#7f1d1d;border-left:3px solid #ef4444}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--rule);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:10px;padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:16px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi-box{background:var(--white);border:1px solid var(--rule);border-radius:7px;padding:14px;border-bottom:3px solid var(--accent)}
.kpi-box.amber{border-bottom-color:var(--amber)}
.kpi-box.green{border-bottom-color:var(--green)}
.kpi-box.red{border-bottom-color:var(--red)}
.kpi-label{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.kpi-val{font-family:var(--display);font-size:18px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--ink-soft);margin-top:2px}

/* LEGENDA */
.legenda{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;font-family:var(--mono);margin-bottom:12px;padding:10px 14px;background:#fafafa;border:1px solid var(--rule);border-radius:6px}
.legenda-item{display:flex;align-items:center;gap:5px}
.legenda-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="login-wrap">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="3" y="17" width="22" height="4" rx="1.5" fill="#1d4ed8" opacity=".9"/>
        <rect x="3" y="11" width="22" height="4" rx="1.5" fill="#1d4ed8" opacity=".6"/>
        <rect x="3" y="5"  width="22" height="4" rx="1.5" fill="#1d4ed8" opacity=".3"/>
        <rect x="6" y="21" width="2.5" height="5" rx="1" fill="#1d4ed8"/>
        <rect x="19.5" y="21" width="2.5" height="5" rx="1" fill="#1d4ed8"/>
      </svg>
      <div>
        <div class="login-title">Escoramento</div>
        <div class="login-sub">Controle de Locação</div>
      </div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="login()" id="btn-login">Entrar</button>
    <div id="login-erro" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" style="display:none">
  <div class="topbar">
    <svg width="16" height="16" viewBox="0 0 28 28" fill="none">
      <rect x="3" y="17" width="22" height="4" rx="1.5" fill="white" opacity=".9"/>
      <rect x="3" y="11" width="22" height="4" rx="1.5" fill="white" opacity=".6"/>
      <rect x="3" y="5"  width="22" height="4" rx="1.5" fill="white" opacity=".3"/>
    </svg>
    <span class="topbar-brand">Controle de Escoramento</span>
    <span class="topbar-sep"></span>
    <span class="topbar-user" id="topbar-email"></span>
    <button class="topbar-btn" onclick="logout()">Sair</button>
  </div>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sb-obra">
        <div class="lbl">Obra ativa</div>
        <div class="nm" id="sb-obra-nome">—</div>
      </div>
      <div class="sb-sec">Obras</div>
      <div class="sb-item active" onclick="nav('obras')" id="nav-obras"><span class="ic">🏗️</span> Minhas Obras</div>
      <div class="sb-sec">Cadastro</div>
      <div class="sb-item" onclick="nav('etapa1')" id="nav-etapa1"><span class="ic">1️⃣</span> Dados da Obra</div>
      <div class="sb-item" onclick="nav('etapa2')" id="nav-etapa2"><span class="ic">2️⃣</span> Parâmetros</div>
      <div class="sb-item" onclick="nav('etapa3')" id="nav-etapa3"><span class="ic">3️⃣</span> Pavimentos</div>
      <div class="sb-sec">Análise</div>
      <div class="sb-item" onclick="nav('cronograma')" id="nav-cronograma"><span class="ic">📅</span> Cronograma</div>
      <div class="sb-item" onclick="nav('admin')" id="nav-admin" style="display:none"><span class="ic">🔐</span> Admin</div>
    </div>
    <div class="content" id="content-area">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- MODAL NOVO USUÁRIO -->
<div class="modal-overlay" id="modal-novo-user">
  <div class="modal-box">
    <div class="modal-title">Novo Usuário</div>
    <div class="field" style="margin-bottom:10px"><label>E-mail</label><input type="email" id="nu-email"></div>
    <div class="field" style="margin-bottom:10px"><label>Senha</label><input type="password" id="nu-senha" placeholder="Mínimo 6 caracteres"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
      <input type="checkbox" id="nu-admin">
      <label for="nu-admin" style="font-size:13px;cursor:pointer">Tornar administrador</label>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="fecharModal('modal-novo-user')">Cancelar</button>
      <button class="btn btn-primary" onclick="criarUsuario()" id="btn-criar-user">Criar</button>
    </div>
    <div id="nu-erro" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SUPA_URL='https://myhgijtbgmpxawcethas.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15aGdpanRiZ21weGF3Y2V0aGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTgyNzksImV4cCI6MjA5MjAzNDI3OX0.Gf5sXtWraTE6jOoFXYvN6wTYTX0bYCLIrbCCGG9Pk7M';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let user=null, obra=null, pavimentos=[];

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const g=id=>document.getElementById(id);
const v=id=>g(id)?.value??'';
const fmt=n=>(!n&&n!==0)?'—':'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const addD=(s,n)=>{if(!s)return null;const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const diffD=(a,b)=>{if(!a||!b)return 0;return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);};

function toast(msg,type=''){
  const t=g('toast');t.textContent=msg;t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',3000);
}
function loading(){g('content-area').innerHTML='<div class="loading"><div class="spinner"></div></div>';}
function fecharModal(id){g(id).classList.remove('open');}
function abrirModal(id){g(id).classList.add('open');}
function semObra(){
  g('content-area').innerHTML=`<div class="alert alert-amber" style="margin-top:20px"><span>⚠️</span>
    <span>Selecione uma obra em <strong>Minhas Obras</strong> primeiro.</span></div>`;
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function login(){
  const email=v('login-email').trim(),senha=v('login-senha');
  const btn=g('btn-login'),erro=g('login-erro');
  erro.textContent='';
  if(!email||!senha){erro.textContent='Preencha e-mail e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando...';
  const{data,error}=await db.auth.signInWithPassword({email,password:senha});
  btn.disabled=false;btn.textContent='Entrar';
  if(error){erro.textContent=error.message.includes('Invalid')?'E-mail ou senha incorretos.':error.message;return;}
  iniciarApp(data.user);
}
async function logout(){
  await db.auth.signOut();
  user=null;obra=null;pavimentos=[];
  g('screen-app').style.display='none';
  g('screen-login').style.display='flex';
  g('login-email').value='';g('login-senha').value='';
}
async function checarSessao(){
  try{const{data:{session}}=await db.auth.getSession();if(session?.user)iniciarApp(session.user);}
  catch(e){console.error(e);}
}
function iniciarApp(u){
  user=u;
  g('screen-login').style.display='none';
  g('screen-app').style.display='block';
  g('topbar-email').textContent=u.email;

function novaObra(){
  const nome=prompt('Nome da obra:');if(!nome)return;
  const contrato=prompt('Nº do contrato (opcional):');
  const fornecedor=prompt('Fornecedor (opcional):');
  const vtotalStr=prompt('Valor Total do Contrato R$ (opcional):');
  const vtotal=parseFloat((vtotalStr||'').replace(',','.'))||null;
  salvarObraDB({nome,contrato:contrato||null,fornecedor:fornecedor||null,valor_total:vtotal});
}

async function editarObra(id){
  const{data:o}=await db.from('obras').select('*').eq('id',id).single();
  if(!o)return;
  const nome=prompt('Nome da obra:',o.nome);if(!nome)return;
  const contrato=prompt('Nº do contrato:',o.contrato||'');
  const fornecedor=prompt('Fornecedor:',o.fornecedor||'');
  const vtotalStr=prompt('Valor Total R$:',o.valor_total||'');
  const vtotal=parseFloat((vtotalStr||'').replace(',','.'))||null;
  await db.from('obras').update({nome,contrato:contrato||null,fornecedor:fornecedor||null,valor_total:vtotal,updated_at:new Date().toISOString()}).eq('id',id);
  if(obra?.id===id){obra.nome=nome;g('sb-obra-nome').textContent=nome;}

}

async function salvarObraDB(payload){

  if(error){toast('Erro: '+error.message,'error');return;}
  obra=data;g('sb-obra-nome').textContent=obra.nome;

}

async function selecionarObra(id){

function calcSeqDatas(pavs){
  return pavs.map((p,idx)=>{
    let dataInicioCalc=null;
    if(idx===0){dataInicioCalc=p.data_inicio||null;}
    else{
      const ant=pavs[idx-1];
      if(ant.data_concretagem)dataInicioCalc=addD(ant.data_concretagem,1);
    }
    return{...p,dataInicioCalc};
  });
}

async function adicionarPavimento(){
  if(!obra)return;
  const ordem=pavimentos.length;
  const{data,error}=await db.from('pavimentos').insert({obra_id:obra.id,nome:`Pavimento ${ordem+1}`,numero:ordem+1,ordem}).select().single();
  if(error){toast('Erro: '+error.message,'error');return;}
  toast('Adicionado!','success');renderEtapa3();
}

async function salvarCampoPav(id,campo,valor){
  const upd={};
  if(campo==='nome')upd.nome=valor;
  else upd[campo]=parseFloat(valor)||null;
  await db.from('pavimentos').update(upd).eq('id',id);
  const idx=pavimentos.findIndex(p=>p.id===id);
  if(idx>=0)Object.assign(pavimentos[idx],upd);
}

async function salvarConcretagem(id,dataConcret){
  await db.from('pavimentos').update({data_concretagem:dataConcret||null}).eq('id',id);
  const idx=pavimentos.findIndex(p=>p.id===id);
  if(idx>=0)pavimentos[idx].data_concretagem=dataConcret||null;
  // Atualiza o início do próximo visualmente
  const proximo=pavimentos[idx+1];
  if(proximo&&dataConcret){
    const novoInicio=addD(dataConcret,1);
    const el=g(`pc-inicio-${proximo.id}`);
    if(el){el.textContent=fmtD(novoInicio);el.style.color='var(--accent)';}
    // Salva data_inicio do próximo
    await db.from('pavimentos').update({data_inicio:novoInicio}).eq('id',proximo.id);
    if(idx+1<pavimentos.length)pavimentos[idx+1].data_inicio=novoInicio;
  }
  toast('Salvo!','success');
}

async function deletarPav(id){
  if(!confirm('Remover este pavimento?'))return;
  await db.from('pavimentos').delete().eq('id',id);
  toast('Removido','success');renderEtapa3();
}

// ═══════════════════════════════════════════
// CRONOGRAMA
// ═══════════════════════════════════════════
async function renderCronograma(){
  if(!obra){semObra();return;}
  loading();
  const[{data:pavs},{data:params}]=await Promise.all([
    db.from('pavimentos').select('*').eq('obra_id',obra.id).order('ordem'),
    db.from('tipos_pavimento').select('*').eq('obra_id',obra.id).eq('nome','_params').maybeSingle(),
  ]);
  pavimentos=pavs||[];

  const X=params?.log_antes??3;
  const Y=params?.dias_apos_concret??3;
  const Z=params?.dur_reesc??21;
  const T=params?.log_movimentacao??3;

  const hoje=new Date().toISOString().slice(0,10);
  const pavComDatas=calcSeqDatas(pavimentos);

  // ── CALCULAR CICLOS ──────────────────────────────
  // REGRA CORRETA DA ESCADINHA:
  //
  // fimReesc(N) = MAX de:
  //   A) iniReesc(N) + Z - 1          → mínimo Z dias de reesc
  //   B) C(N+2) + 1 dia               → se existe laje +2, termina 1d após ela concretar
  //
  // Para os 2 ÚLTIMOS (sem laje +2), a regra B não existe.
  // MAS a escadinha garante: fimReesc(N) >= fimReesc(N+1)
  // porque C(N) < C(N+1) → iniReesc(N) < iniReesc(N+1)
  // → fimReescPorZ(N) < fimReescPorZ(N+1)
  // LOGO: para os penúltimos sem laje +2, o fimReesc deles
  // é naturalmente menor — EXCETO que precisamos garantir que
  // o reesc do G3 não termina antes de o Lazer ter sido concretado
  // + Z dias.
  //
  // REGRA FINAL CORRETA:
  // fimReesc(N) = MAX(
  //   iniReesc(N) + Z - 1,            → Z mínimo
  //   C(N+2) + 1,                     → 1d após laje +2 (se existir)
  //   C(N+1) + Y + 1 + Z - 1         → Z dias após fim do esc da laje +1 (se existir)
  // )
  //
  // Simplificando: o reesc de N não termina antes que a laje N+1
  // complete seu próprio escoramento (Y dias) + Z dias de reesc.

  const ciclos = pavComDatas.map((p,idx)=>{
    const dataInicio = p.dataInicioCalc||p.data_inicio||null;
    const C = p.data_concretagem||null;

    // Escoramento: dataInicio → C + Y
    const fimEsc = C ? addD(C, Y) : null;
    const iniReesc = fimEsc ? addD(fimEsc, 1) : null;

    // Laje +1 e +2
    const lajeMais1 = pavComDatas[idx+1]||null;
    const lajeMais2 = pavComDatas[idx+2]||null;
    const cMais1 = lajeMais1?.data_concretagem||null;
    const cMais2 = lajeMais2?.data_concretagem||null;

    // Candidatos para fim do reesc
    let candidatos = [];

    // A: mínimo Z dias
    if(iniReesc) candidatos.push({fim: addD(iniReesc, Z-1), crit:'z'});

    // B: 1 dia após concretagem da laje +2 (regra principal)
    if(cMais2) candidatos.push({fim: addD(cMais2, 1), crit:'laje2'});

    // C: Z dias após o início do reesc da laje +1
    // (garante que o reesc de N não termina antes que laje+1 complete Z dias de reesc)
    // fimReesc(N+1) por Z = C(N+1) + Y + 1 (iniReesc) + Z - 1
    if(cMais1){
      const iniReescMais1 = addD(addD(cMais1, Y), 1);
      const fimReescMais1porZ = addD(iniReescMais1, Z-1);
      candidatos.push({fim: fimReescMais1porZ, crit:'laje1z'});
    }

    // Pega o maior
    let melhor = candidatos[0]||{fim:null,crit:'z'};
    for(const c of candidatos){
      if(c.fim && (!melhor.fim || new Date(c.fim) > new Date(melhor.fim))){
        melhor = c;
      }
    }

    const fimReesc = melhor.fim;
    const reescPorMais2 = melhor.crit === 'laje2';
    const criterioReesc = melhor.crit;

    const diasEsc = dataInicio && C ? diffD(dataInicio, C) : null;
    const diasReesc = iniReesc && fimReesc ? diffD(iniReesc, fimReesc) + 1 : null;

    let status = 'aguard';
    if(!C){ status = 'aguard'; }
    else if(hoje < C){ status = 'esc_antes'; }
    else if(hoje >= C && fimEsc && hoje <= fimEsc){ status = 'esc_apos'; }
    else if(iniReesc && fimReesc && hoje >= iniReesc && hoje <= fimReesc){ status = 'reesc'; }
    else if(fimReesc && hoje > fimReesc){ status = 'ok'; }

    const diasParaFim = fimReesc ? diffD(hoje, fimReesc) : null;
    const alertaFim = diasParaFim !== null && diasParaFim >= 0 && diasParaFim <= 5 && status === 'reesc';

    return{p,idx,dataInicio,C,fimEsc,iniReesc,fimReesc,reescPorMais2,lajeMais2,criterioReesc,diasEsc,diasReesc,status,alertaFim,diasParaFim};
  });

  // Alertas urgentes
  const alertas = ciclos.filter(c => c.alertaFim);

  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-family:var(--display);font-size:20px;font-weight:700">Cronograma & Ciclos</div>
        <div style="font-size:12px;color:var(--ink-soft)">${obra.nome} · X=${X}d · Y=${Y}d · Z=${Z}d · T=${T}d</div>
      </div>
    </div>`;

  if(alertas.length){
    html+=`<div class="alert alert-red"><span>🚨</span><div><strong>Atenção — Desmobilização iminente:</strong><br>
      ${alertas.map(c=>`<strong>${c.p.nome}</strong>: reesc. termina em ${fmtD(c.fimReesc)} (${c.diasParaFim}d restante${c.diasParaFim===1?'':'s'})`).join('<br>')}
    </div></div>`;
  }

  const semData=ciclos.filter(c=>!c.C);
  if(semData.length){
    html+=`<div class="alert alert-amber"><span>⚠️</span><span>${semData.length} pavimento(s) sem data de concretagem. Informe em <strong>Pavimentos</strong>.</span></div>`;
  }

  // KPIs
  const emEscAntes = ciclos.filter(c=>c.status==='esc_antes').length;
  const emEscApos  = ciclos.filter(c=>c.status==='esc_apos').length;
  const emReesc    = ciclos.filter(c=>c.status==='reesc').length;
  const concluidos = ciclos.filter(c=>c.status==='ok').length;

  html+=`<div class="kpi-row">
    <div class="kpi-box"><div class="kpi-label">Total Pavimentos</div><div class="kpi-val">${pavimentos.length}</div><div class="kpi-sub">${ciclos.filter(c=>c.C).length} com datas</div></div>
    <div class="kpi-box amber"><div class="kpi-label">Em Escoramento</div><div class="kpi-val">${emEscAntes+emEscApos}</div><div class="kpi-sub">antes: ${emEscAntes} · pós-concret: ${emEscApos}</div></div>
    <div class="kpi-box green"><div class="kpi-label">Em Reescoramento</div><div class="kpi-val">${emReesc}</div></div>
    <div class="kpi-box"><div class="kpi-label">Concluídos</div><div class="kpi-val">${concluidos}</div></div>
  </div>

  <div class="legenda">
    <div class="legenda-item"><div class="legenda-dot" style="background:#1d4ed8;opacity:.5"></div>Esc. (executando)</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#1d4ed8"></div>Esc. (cura Y dias)</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#15803d"></div>🟢 Reesc. pela laje +2</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#b45309"></div>🟡 Reesc. Z dias após laje +1</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#b91c1c"></div>🔴 Reesc. Z mínimo (último)</div>
  </div>

  <div class="card"><div class="tbl-wrap"><table class="crono-tbl">
    <thead><tr>
      <th>#</th>
      <th>Pavimento</th>
      <th>Início Exec.</th>
      <th>Concretagem (C)</th>
      <th>Fim Esc. (C+${Y}d)</th>
      <th>Início Reesc.</th>
      <th>Fim Reesc.</th>
      <th>Critério</th>
      <th>Dias Esc.</th>
      <th>Dias Reesc.</th>
      <th>Status Esc.</th>
      <th>Status Reesc.</th>
    </tr></thead>
    <tbody>`;

  ciclos.forEach(c=>{
    const{p,idx,dataInicio,C,fimEsc,iniReesc,fimReesc,reescPorMais2,lajeMais2,diasEsc,diasReesc,status,alertaFim}=c;

    // Status Escoramento
    const statusEsc =
      status==='esc_antes' ? `<span class="bar-esc" style="opacity:.6">⬛ Executando</span>` :
      status==='esc_apos'  ? `<span class="bar-esc">🔵 Cura (${Y}d)</span>` :
      (status==='reesc'||status==='ok') ? `<span class="chip chip-green" style="font-size:10px">✓ Concluído</span>` :
      C ? `<span class="chip chip-green" style="font-size:10px">✓ Concluído</span>` :
      `<span class="bar-aguard">Aguardando</span>`;

    const statusReesc =
      status==='reesc' && c.criterioReesc==='laje2'  ? `<span class="bar-reesc">🟢 Em reesc.</span>` :
      status==='reesc' && c.criterioReesc==='laje1z' ? `<span class="bar-reesc" style="background:#b45309">🟡 Em reesc.</span>` :
      status==='reesc'                                ? `<span class="bar-reesc alerta">🔴 Em reesc.</span>` :
      status==='ok' ? `<span class="chip chip-green" style="font-size:10px">✓ Concluído</span>` :
      (status==='esc_antes'||status==='esc_apos') ? `<span class="bar-aguard">Aguarda esc.</span>` :
      `<span class="bar-aguard">Aguardando</span>`;

    const criterio = !C ? '—' :
      c.criterioReesc==='laje2'  ? `<span class="chip chip-green">📅 ${c.lajeMais2?.nome||'Laje +2'}</span>` :
      c.criterioReesc==='laje1z' ? `<span class="chip chip-amber">📅+Z Laje +1</span>` :
      `<span class="chip chip-red">⏱ Z mín. (${Z}d)</span>`;

    // Linha com destaque
    const rowBg = alertaFim ? 'background:#fef2f2' :
      status==='esc_antes'||status==='esc_apos' ? 'background:#eff6ff' :
      status==='reesc' ? 'background:#f0fdf4' : '';

    html+=`<tr style="${rowBg}">
      <td class="num" style="color:var(--ink-soft);font-weight:700">${idx+1}</td>
      <td class="nome">${p.nome}</td>
      <td class="dt">${fmtD(dataInicio)}</td>
      <td class="dt" style="font-weight:700">${fmtD(C)}</td>
      <td class="dt">${fmtD(fimEsc)}</td>
      <td class="dt">${fmtD(iniReesc)}</td>
      <td class="dt" style="${c.criterioReesc!=='laje'&&C?'color:var(--red);font-weight:700':''}${alertaFim?';background:#fee2e2':''}">${fmtD(fimReesc)}</td>
      <td>${criterio}</td>
      <td class="num">${diasEsc!=null?diasEsc+'d':'—'}</td>
      <td class="num">${diasReesc!=null?diasReesc+'d':'—'}</td>
      <td>${statusEsc}</td>
      <td>${statusReesc}</td>
    </tr>`;
  });

  html+=`</tbody></table></div></div>
  <div style="margin-top:14px;display:flex;gap:10px">
    <button class="btn btn-ghost" onclick="nav('etapa3')">← Pavimentos</button>
  </div>`;

  g('content-area').innerHTML=html;
}

// ADMIN
// ═══════════════════════════════════════════
async function renderAdmin(){
  if(!user?.isAdmin){g('content-area').innerHTML='<div class="alert alert-red" style="margin:20px"><span>🚫</span><span>Acesso restrito.</span></div>';return;}
  loading();
  const[{data:profiles},{data:todasObras}]=await Promise.all([
    db.from('profiles').select('*').order('created_at'),
    db.from('obras').select('*').order('created_at',{ascending:false}),
  ]);
  const users=profiles||[],obras=todasObras||[];
  const opu={};obras.forEach(o=>{if(!opu[o.user_id])opu[o.user_id]=[];opu[o.user_id].push(o);});
  const totC=obras.reduce((s,o)=>s+(o.valor_total||0),0);

  g('content-area').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:var(--display);font-size:20px;font-weight:700">🔐 Painel Admin</div>
      <span class="chip chip-blue">👑 ${user.email}</span>
    </div>
    <div class="kpi-row">
      <div class="kpi-box"><div class="kpi-label">Usuários</div><div class="kpi-val">${users.length}</div></div>
      <div class="kpi-box amber"><div class="kpi-label">Total Obras</div><div class="kpi-val">${obras.length}</div></div>
      <div class="kpi-box green"><div class="kpi-label">Valor Total Contratos</div><div class="kpi-val" style="font-size:14px">${fmt(totC)}</div></div>
    </div>
    <div class="card"><div class="card-head">
      <span class="card-head-title">👥 Usuários</span>
      <button class="btn btn-primary btn-sm" onclick="abrirModal('modal-novo-user')">+ Novo</button>
    </div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>E-mail</th><th>Perfil</th><th>Obras</th><th>Desde</th><th></th></tr></thead>
      <tbody>${users.map(u=>`<tr>
        <td>${u.email}</td>
        <td><span class="chip ${u.is_admin?'chip-blue':'chip-gray'}">${u.is_admin?'👑 Admin':'Usuário'}</span></td>
        <td class="num">${(opu[u.id]||[]).length}</td>
        <td class="mono">${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
        <td style="display:flex;gap:5px">
          ${!u.is_admin?`<button class="btn btn-ghost btn-sm" onclick="tornarAdmin('${u.id}')">👑</button>`:''}
          ${u.id!==user.id?`<button class="btn btn-danger btn-sm" onclick="deletarUsuario('${u.id}','${u.email}')">✕</button>`:'<span style="font-size:11px;color:var(--ink-soft)">você</span>'}
        </td>
      </tr>`).join('')}</tbody>
    </table></div></div>
    <div class="card"><div class="card-head"><span class="card-head-title">🏗️ Todas as Obras</span></div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Obra</th><th>Usuário</th><th>Contrato</th><th>Valor</th><th></th></tr></thead>
      <tbody>${obras.map(o=>{const u=users.find(u=>u.id===o.user_id);return`<tr>
        <td><strong>${o.nome}</strong></td>
        <td style="font-size:12px;color:var(--ink-soft)">${u?.email||'—'}</td>
        <td class="mono">${o.contrato||'—'}</td>
        <td class="num">${fmt(o.valor_total)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="verObraAdmin('${o.id}')">👁</button></td>
      </tr>`;}).join('')}</tbody>
    </table></div></div>`;
}

async function criarUsuario(){
  const email=g('nu-email').value.trim(),senha=g('nu-senha').value;
  const isAdm=g('nu-admin').checked,erro=g('nu-erro'),btn=g('btn-criar-user');
  erro.textContent='';
  if(!email||!senha){erro.textContent='Preencha e-mail e senha.';return;}
  if(senha.length<6){erro.textContent='Senha mínima: 6 caracteres.';return;}
  btn.disabled=true;btn.textContent='Criando...';
  const{data,error}=await db.auth.signUp({email,password:senha});
  btn.disabled=false;btn.textContent='Criar';
  if(error){erro.textContent='Erro: '+error.message;return;}
  if(isAdm&&data?.user)await db.from('profiles').upsert({id:data.user.id,email,is_admin:true});
  fecharModal('modal-novo-user');toast('Usuário criado!','success');renderAdmin();
}

async function tornarAdmin(id){
  if(!confirm('Tornar admin?'))return;
  await db.from('profiles').update({is_admin:true}).eq('id',id);
  toast('Feito!','success');renderAdmin();
}

async function deletarUsuario(id,email){
  if(!confirm(`Remover ${email}?`))return;
  await db.from('obras').delete().eq('user_id',id);
  await db.from('profiles').delete().eq('id',id);
  toast('Removido','success');renderAdmin();
}

async function verObraAdmin(id){
  const{data:o}=await db.from('obras').select('*').eq('id',id).single();
  if(!o)return;
  obra=o;g('sb-obra-nome').textContent=o.nome;
  toast(`Visualizando: ${o.nome}`,'success');nav('etapa1');
}
