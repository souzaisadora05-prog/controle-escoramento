<script>
// ════════════════════════════════════════════════════
// SUPABASE CONFIG — substitua pela sua nova chave após o reset
// ════════════════════════════════════════════════════
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let currentUser = null;
let obraAtiva   = null;
let lajesCache  = [];
let tiposCache  = [];

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function fmt(n) {
  if (n == null || isNaN(n) || n === '') return '—';
  return 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function v(id) { const el = document.getElementById(id); return el ? el.value : ''; }

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

function setLoading(html) {
  document.getElementById('content-area').innerHTML = html ||
    '<div class="loading"><div class="spinner"></div><span style="font-size:13px;color:var(--ink-soft);">Carregando...</span></div>';
}

// ════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════
async function fazerLogin() {
  const email = v('login-email').trim();
  const senha = v('login-senha');
  const btn   = document.getElementById('btn-login');
  const erro  = document.getElementById('login-erro');
  erro.textContent = '';

  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }

  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
    btn.disabled = false;
    btn.textContent = 'Entrar';

    if (error) {
      console.error('Login error:', error);
      if (error.message.includes('Invalid login')) {
        erro.textContent = 'E-mail ou senha incorretos.';
      } else if (error.message.includes('Email not confirmed')) {
        erro.textContent = 'E-mail não confirmado. Desative a confirmação no Supabase.';
      } else {
        erro.textContent = 'Erro: ' + error.message;
      }
      return;
    }

    if (data?.user) {
      iniciarApp(data.user);
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    erro.textContent = 'Erro de conexão. Verifique sua internet.';
    console.error('Exception:', e);
  }
}

async function sair() {
  await sb.auth.signOut();
  currentUser = null; obraAtiva = null; lajesCache = []; tiposCache = [];
  document.getElementById('screen-app').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
}

function iniciarApp(user) {
  currentUser = user;
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('topbar-email').textContent = user.email;
  navegar('obras');
}

// ════════════════════════════════════════════════════
// NAVEGAÇÃO
// ════════════════════════════════════════════════════
function navegar(pagina) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${pagina}`);
  if (navEl) navEl.classList.add('active');

  switch (pagina) {
    case 'obras':   renderObras(); break;
    case 'projeto': renderProjeto(); break;
    case 'lajes':   renderLajes(); break;
    case 'pecas':   renderPecas(); break;
    case 'resumo':  renderResumo(); break;
  }
}

async function renderObras() {
  setLoading();
  const { data: obras, error } = await sb.from('obras').select('*').order('created_at', { ascending: false });
  if (error) { setLoading('<p style="padding:24px;color:var(--red);">Erro ao carregar obras: ' + error.message + '</p>'); return; }

  let html = `
    <div class="page-title">Minhas Obras</div>
    <div class="page-sub">Selecione uma obra existente ou crie uma nova.</div>
    <div style="margin-bottom:20px;">
      <button class="btn btn-primary" onclick="novaObraModal()">+ Nova Obra</button>
    </div>`;

  if (!obras || obras.length === 0) {
    html += `<div class="alert alert-info"><span>ℹ️</span><span>Nenhuma obra cadastrada ainda. Clique em <strong>Nova Obra</strong> para começar.</span></div>`;
  } else {
    html += '<div class="obra-list">';
    obras.forEach(o => {
      const ativa = obraAtiva?.id === o.id;
      html += `
        <div class="obra-card ${ativa ? 'active' : ''}" style="${ativa ? 'border-color:var(--accent);' : ''}" onclick="selecionarObra('${o.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div class="obra-card-name">${o.nome}</div>
            ${ativa ? '<span class="chip chip-blue">Ativa</span>' : ''}
          </div>
          <div class="obra-card-meta">Contrato: ${o.contrato || '—'} · ${o.fornecedor || '—'}</div>
          <div class="obra-card-footer">
            <span style="font-size:11px;color:var(--ink-soft);">${o.total_lajes || 0} lajes · ${o.jogos || 1} jogo(s)</span>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editarObra('${o.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletarObra('${o.id}')">✕</button>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  html += `
    <!-- MODAL NOVA OBRA -->
    <div id="modal-obra" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;">
      <div style="background:var(--white);border-radius:10px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;">
        <div style="font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:20px;" id="modal-obra-title">Nova Obra</div>
        <input type="hidden" id="modal-obra-id">
        <div class="form-grid form-grid-2" style="margin-bottom:12px;">
          <div class="field"><label>Nome da Obra *</label><input type="text" id="mo-nome" placeholder="Ex: Edifício Residencial Alpha"></div>
          <div class="field"><label>Nº Contrato</label><input type="text" id="mo-contrato" placeholder="Ex: 1587"></div>
          <div class="field"><label>Fornecedor</label><input type="text" id="mo-fornecedor" placeholder="Ex: SH Formas Andaimes"></div>
          <div class="field"><label>Data de Início</label><input type="date" id="mo-inicio"></div>
          <div class="field"><label>Nº Pavimentos</label><input type="number" id="mo-pavimentos" placeholder="Ex: 23" min="1"></div>
          <div class="field"><label>Nº Total Lajes</label><input type="number" id="mo-lajes" placeholder="Ex: 23" min="1"></div>
          <div class="field"><label>Jogos de Escoramento</label><select id="mo-jogos"><option value="1">1 jogo</option><option value="2">2 jogos</option><option value="3">3 jogos</option></select></div>
          <div class="field"><label>Valor Mensal (R$)</label><input type="number" id="mo-valor-mensal" placeholder="28801.17" step="0.01"></div>
          <div class="field"><label>Valor Total Contrato (R$)</label><input type="number" id="mo-valor-total" placeholder="576023.40" step="0.01"></div>
          <div class="field"><label>Frete (R$)</label><input type="number" id="mo-frete" placeholder="90000.00" step="0.01"></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
          <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="salvarObra()" id="btn-salvar-obra">Salvar Obra</button>
        </div>
      </div>
    </div>`;

  document.getElementById('content-area').innerHTML = html;
}

function novaObraModal() {
  document.getElementById('modal-obra-title').textContent = 'Nova Obra';
  document.getElementById('modal-obra-id').value = '';
  ['mo-nome','mo-contrato','mo-fornecedor','mo-inicio','mo-pavimentos','mo-lajes','mo-valor-mensal','mo-valor-total','mo-frete'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('mo-jogos').value = '1';
  document.getElementById('modal-obra').style.display = 'flex';
}

async function editarObra(id) {
  const { data: o } = await sb.from('obras').select('*').eq('id', id).single();
  if (!o) return;
  document.getElementById('modal-obra-title').textContent = 'Editar Obra';
  document.getElementById('modal-obra-id').value = o.id;
  document.getElementById('mo-nome').value         = o.nome || '';
  document.getElementById('mo-contrato').value     = o.contrato || '';
  document.getElementById('mo-fornecedor').value   = o.fornecedor || '';
  document.getElementById('mo-inicio').value       = o.inicio || '';
  document.getElementById('mo-pavimentos').value   = o.pavimentos || '';
  document.getElementById('mo-lajes').value        = o.total_lajes || '';
  document.getElementById('mo-jogos').value        = o.jogos || 1;
  document.getElementById('mo-valor-mensal').value = o.valor_mensal || '';
  document.getElementById('mo-valor-total').value  = o.valor_total || '';
  document.getElementById('mo-frete').value        = o.frete || '';
  document.getElementById('modal-obra').style.display = 'flex';
}

function fecharModal() {
  const m = document.getElementById('modal-obra');
  if (m) m.style.display = 'none';
}

async function salvarObra() {
  const nome = v('mo-nome').trim();
  if (!nome) { toast('Informe o nome da obra', 'error'); return; }
  const btn = document.getElementById('btn-salvar-obra');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const payload = {
    user_id:      currentUser.id,
    nome,
    contrato:     v('mo-contrato'),
    fornecedor:   v('mo-fornecedor'),
    inicio:       v('mo-inicio') || null,
    pavimentos:   parseInt(v('mo-pavimentos')) || null,
    total_lajes:  parseInt(v('mo-lajes')) || null,
    jogos:        parseInt(v('mo-jogos')) || 1,
    valor_mensal: parseFloat(v('mo-valor-mensal')) || null,
    valor_total:  parseFloat(v('mo-valor-total')) || null,
    frete:        parseFloat(v('mo-frete')) || null,
    updated_at:   new Date().toISOString(),
  };

  const obraId = v('modal-obra-id');
  let error;
  if (obraId) {
    ({ error } = await sb.from('obras').update(payload).eq('id', obraId));
  } else {
    const { data, error: e } = await sb.from('obras').insert(payload).select().single();
    error = e;
    if (data) { obraAtiva = data; atualizarSidebarObra(); }
  }

  btn.disabled = false; btn.textContent = 'Salvar Obra';
  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  toast('Obra salva!', 'success');
  fecharModal();
  renderObras();
}

async function selecionarObra(id) {
  const { data: o } = await sb.from('obras').select('*').eq('id', id).single();
  if (!o) return;
  obraAtiva = o;
  atualizarSidebarObra();
  toast(`Obra "${o.nome}" selecionada`, 'success');
  navegar('projeto');
}

function atualizarSidebarObra() {
  document.getElementById('sidebar-obra-nome').textContent = obraAtiva?.nome || '—';
}

async function deletarObra(id) {
  if (!confirm('Deletar esta obra? Todos os dados (lajes, peças) serão removidos.')) return;
  const { error } = await sb.from('obras').delete().eq('id', id);
  if (error) { toast('Erro ao deletar: ' + error.message, 'error'); return; }
  if (obraAtiva?.id === id) { obraAtiva = null; atualizarSidebarObra(); }
  toast('Obra removida', 'success');
  renderObras();
}

async function renderLajes() {
  if (!obraAtiva) { setLoading('<div class="alert alert-amber" style="margin:24px;"><span>⚠️</span><span>Selecione uma obra primeiro.</span></div>'); return; }
  setLoading();

  const { data: lajes } = await sb.from('lajes').select('*').eq('obra_id', obraAtiva.id).order('ordem');
  lajesCache = lajes || [];

  let html = `
    <div class="page-title">Lajes & Ciclos</div>
    <div class="page-sub">Cadastre cada laje com sua data de concretagem e os parâmetros de escoramento.</div>
    <div class="alert alert-info"><span>ℹ️</span>
      <span><strong>Escoramento</strong> = dias suportando a laje até o concreto curar. <strong>Reescoramento</strong> = começa alguns dias após a concretagem, garantindo resistência de 50%.</span>
    </div>

          <div class="field"><label>Início reesc. (dias após concret.)</label><input type="number" id="padrao-inireesc" value="7" min="1"></div>

        </div>

          <button class="btn btn-ghost btn-sm" onclick="adicionarLaje()">+ Adicionar Laje com esses parâmetros</button>
        </div>

function renderLajeItem(l) {
  const totalCiclo = (l.dias_esc||3) + (l.ini_reesc||7) + (l.dur_reesc||28);
  const pEsc   = (((l.dias_esc||3)  / totalCiclo) * 100).toFixed(1);
  const pGap   = (((l.ini_reesc||7) / totalCiclo) * 100).toFixed(1);
  const pReesc = (((l.dur_reesc||28)/ totalCiclo) * 100).toFixed(1);
  return `
    <div class="laje-item" id="li-${l.id}">
      <div class="laje-item-head" onclick="toggleLajeItem('${l.id}')">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-family:var(--mono);font-size:10px;color:var(--ink-soft);">Laje</span>
          <span class="laje-item-title">${l.nome || 'Sem nome'}</span>
          ${l.pavimento ? `<span class="chip chip-gray">${l.pavimento}</span>` : ''}
          ${l.concretagem ? `<span class="chip chip-blue">${fmtDate(l.concretagem)}</span>` : '<span class="chip chip-amber">sem data</span>'}
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span style="font-family:var(--mono);font-size:10px;color:var(--ink-soft);">Ciclo: ${totalCiclo}d</span>
          <button class="btn btn-success btn-sm" onclick="event.stopPropagation();salvarLaje('${l.id}')">💾</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletarLaje('${l.id}')">✕</button>
        </div>
      </div>
      <div class="laje-item-body collapsed" id="lib-${l.id}">
        <div class="form-grid" style="gap:12px;">
          <div class="field"><label>Nome / Identificação</label><input type="text" id="lf-nome-${l.id}" value="${l.nome||''}" placeholder="Ex: Laje 10"></div>
          <div class="field"><label>Pavimento</label><input type="text" id="lf-pav-${l.id}" value="${l.pavimento||''}" placeholder="Ex: Tipo A – 10º"></div>
          <div class="field"><label>Concretagem</label><input type="date" id="lf-concret-${l.id}" value="${l.concretagem||''}"></div>
          <div class="field"><label>Dias esc. pós-concret.</label><input type="number" id="lf-esc-${l.id}" value="${l.dias_esc||3}" min="1"></div>
          <div class="field"><label>Início reesc. (dias)</label><input type="number" id="lf-inireesc-${l.id}" value="${l.ini_reesc||7}" min="1"></div>
          <div class="field"><label>Duração reesc. (dias)</label><input type="number" id="lf-durreesc-${l.id}" value="${l.dur_reesc||28}" min="1"></div>
        </div>
        <div style="margin-top:12px;">
          <div style="font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin-bottom:4px;">Visualização do ciclo</div>
          <div class="cycle-bar">
            <div class="cycle-seg" style="width:${pEsc}%;background:#1d4ed8;">Esc ${l.dias_esc||3}d</div>
            <div class="cycle-seg" style="width:${pGap}%;background:#9ca3af;">Espera</div>
            <div class="cycle-seg" style="width:${pReesc}%;background:#15803d;">Reesc ${l.dur_reesc||28}d</div>
          </div>
          <div style="display:flex;gap:14px;margin-top:5px;font-size:10px;color:var(--ink-soft);font-family:var(--mono);">
            <span>🔵 Escoramento: ${l.dias_esc||3}d</span>
            <span>⚪ Espera: ${l.ini_reesc||7}d</span>
            <span>🟢 Reescoramento: ${l.dur_reesc||28}d</span>
            <span style="margin-left:auto;font-weight:600;color:var(--ink);">Total: ${totalCiclo}d</span>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleLajeItem(id) {
  document.getElementById(`lib-${id}`)?.classList.toggle('collapsed');
}

async function adicionarLaje() {
  if (!obraAtiva) return;
  const ordem = lajesCache.length;
  const payload = {
    obra_id:    obraAtiva.id,
    nome:       `Laje ${ordem + 1}`,
    pavimento:  '',
    concretagem: null,
    dias_esc:   parseInt(v('padrao-esc'))      || 3,
    ini_reesc:  parseInt(v('padrao-inireesc')) || 7,
    dur_reesc:  parseInt(v('padrao-durreesc')) || 28,
    ordem,
  };
  const { data, error } = await sb.from('lajes').insert(payload).select().single();
  if (error) { toast('Erro ao criar laje: ' + error.message, 'error'); return; }
  lajesCache.push(data);
  const container = document.getElementById('lajes-list') || (() => {
    const d = document.createElement('div'); d.id = 'lajes-list';
    document.querySelector('.btn-add')?.insertAdjacentElement('beforebegin', d);
    return d;
  })();
  container.insertAdjacentHTML('beforeend', renderLajeItem(data));
  toast('Laje adicionada!', 'success');
}

async function salvarLaje(id) {
  const payload = {
    nome:        v(`lf-nome-${id}`),
    pavimento:   v(`lf-pav-${id}`),
    concretagem: v(`lf-concret-${id}`) || null,
    dias_esc:    parseInt(v(`lf-esc-${id}`))     || 3,
    ini_reesc:   parseInt(v(`lf-inireesc-${id}`)) || 7,
    dur_reesc:   parseInt(v(`lf-durreesc-${id}`)) || 28,
  };
  const { error } = await sb.from('lajes').update(payload).eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  const idx = lajesCache.findIndex(l => l.id === id);
  if (idx >= 0) Object.assign(lajesCache[idx], payload);
  toast('Laje salva!', 'success');
  renderLajes();
}

async function deletarLaje(id) {
  if (!confirm('Remover esta laje?')) return;
  const { error } = await sb.from('lajes').delete().eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  lajesCache = lajesCache.filter(l => l.id !== id);
  document.getElementById(`li-${id}`)?.remove();
  toast('Laje removida', 'success');
}

          <button class="btn btn-ghost btn-sm" onclick="salvarLogistica('${log?.id||''}')">💾 Salvar logística</button>
        </div>
        <div class="alert alert-amber" style="margin-top:12px;margin-bottom:0;">
          <span>⚠️</span>
          <span>Esse período em que a peça fica locada mas <strong>não está sendo usada</strong> é o <strong>tempo ocioso</strong> — gera custo separado no resumo.</span>
        </div>
      </div>
    </div>
    <div id="tipos-list">`;

  tiposCache.forEach(t => { html += renderTipoCard(t); });
  html += `</div>
    <button class="btn btn-add" style="width:100%;justify-content:center;padding:12px;margin-top:4px;" onclick="adicionarTipo()">
      + Adicionar Tipo de Laje / Grupo de Peças
    </button>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="navegar('lajes')">← Lajes</button>
      <button class="btn btn-ghost" onclick="navegar('resumo')">Ver Resumo →</button>
    </div>`;

  document.getElementById('content-area').innerHTML = html;
}

function renderTipoCard(t) {
  const totalDia = (t.pecas||[]).reduce((s,p) => s + (p.quantidade||0)*(p.valor_dia||0), 0);
  let pecasRows = (t.pecas||[]).map(p => `
    <tr>
      <td><input class="inline-input" type="text" id="pc-desc-${p.id}" value="${p.descricao||''}" placeholder="Ex: Escora Plus SH Fêmea" onblur="salvarPeca('${p.id}')"></td>
      <td><input class="inline-input" type="number" id="pc-qtd-${p.id}" value="${p.quantidade||''}" placeholder="0" style="width:80px;" onblur="salvarPeca('${p.id}')"></td>
      <td><input class="inline-input" type="number" id="pc-vd-${p.id}" value="${p.valor_dia||''}" placeholder="0.000" step="0.001" onblur="salvarPeca('${p.id}')"></td>
      <td class="num">R$ ${((p.quantidade||0)*(p.valor_dia||0)).toFixed(2)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deletarPeca('${p.id}','${t.id}')">✕</button></td>
    </tr>`).join('');

  return `
    <div class="card" id="tipo-card-${t.id}" style="margin-bottom:14px;">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:10px;flex:1;">
          <input type="text" id="tipo-nome-${t.id}" value="${t.nome||''}"
            style="border:none;font-family:var(--display);font-size:13px;font-weight:700;outline:none;background:transparent;flex:1;"
            onblur="salvarTipoNome('${t.id}')">
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-family:var(--mono);font-size:11px;color:var(--ink-soft);">R$ ${totalDia.toFixed(3)}/dia</span>
          <button class="btn btn-danger btn-sm" onclick="deletarTipo('${t.id}')">✕ Remover</button>
        </div>
      </div>
      <div style="padding:0;">
        <table class="tbl">
          <thead><tr>
            <th>Descrição da Peça</th><th>Quantidade</th><th>Valor Unit./Dia (R$)</th><th>Subtotal/Dia</th><th></th>
          </tr></thead>
          <tbody id="pecas-tbody-${t.id}">${pecasRows}</tbody>
          <tfoot><tr>
            <td colspan="3">Total diário deste tipo</td>
            <td class="num">R$ ${totalDia.toFixed(3)}</td><td></td>
          </tr></tfoot>
        </table>
        <div style="padding:10px 14px;">
          <button class="btn btn-add btn-sm" onclick="adicionarPeca('${t.id}')">+ Adicionar Peça</button>
        </div>
      </div>
    </div>`;
}

async function salvarLogistica(logId) {
  const antes  = parseInt(v('log-antes'))  || 0;
  const depois = parseInt(v('log-depois')) || 0;
  const payload = { obra_id: obraAtiva.id, dias_antes: antes, dias_depois: depois };
  let error;
  if (logId) {
    ({ error } = await sb.from('logistica').update(payload).eq('id', logId));
  } else {
    ({ error } = await sb.from('logistica').insert(payload));
  }
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Logística salva!', 'success');
}

async function adicionarTipo() {
  if (!obraAtiva) return;
  const { data, error } = await sb.from('tipos_laje').insert({ obra_id: obraAtiva.id, nome: `Tipo ${tiposCache.length + 1}` }).select('*, pecas(*)').single();
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  tiposCache.push(data);
  document.getElementById('tipos-list').insertAdjacentHTML('beforeend', renderTipoCard(data));
  toast('Grupo adicionado!', 'success');
}

async function salvarTipoNome(id) {
  const nome = v(`tipo-nome-${id}`);
  await sb.from('tipos_laje').update({ nome }).eq('id', id);
}

async function deletarTipo(id) {
  if (!confirm('Remover este grupo e todas as peças?')) return;
  const { error } = await sb.from('tipos_laje').delete().eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  tiposCache = tiposCache.filter(t => t.id !== id);
  document.getElementById(`tipo-card-${id}`)?.remove();
  toast('Grupo removido', 'success');
}

async function adicionarPeca(tipoId) {
  const { data, error } = await sb.from('pecas').insert({ tipo_id: tipoId, descricao: '', quantidade: 0, valor_dia: 0 }).select().single();
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  const tipo = tiposCache.find(t => t.id === tipoId);
  if (tipo) tipo.pecas.push(data);
  const tbody = document.getElementById(`pecas-tbody-${tipoId}`);
  if (tbody) tbody.insertAdjacentHTML('beforeend', `
    <tr id="peca-row-${data.id}">
      <td><input class="inline-input" type="text" id="pc-desc-${data.id}" placeholder="Ex: Escora Plus SH Fêmea" onblur="salvarPeca('${data.id}')"></td>
      <td><input class="inline-input" type="number" id="pc-qtd-${data.id}" placeholder="0" style="width:80px;" onblur="salvarPeca('${data.id}')"></td>
      <td><input class="inline-input" type="number" id="pc-vd-${data.id}" placeholder="0.000" step="0.001" onblur="salvarPeca('${data.id}')"></td>
      <td class="num" id="pcsub-${data.id}">R$ 0.00</td>
      <td><button class="btn btn-danger btn-sm" onclick="deletarPeca('${data.id}','${tipoId}')">✕</button></td>
    </tr>`);
}

async function salvarPeca(id) {
  const desc = v(`pc-desc-${id}`);
  const qtd  = parseInt(v(`pc-qtd-${id}`)) || 0;
  const vd   = parseFloat(v(`pc-vd-${id}`)) || 0;
  await sb.from('pecas').update({ descricao: desc, quantidade: qtd, valor_dia: vd }).eq('id', id);
  const sub = document.getElementById(`pcsub-${id}`);
  if (sub) sub.textContent = `R$ ${(qtd * vd).toFixed(2)}`;
}

async function deletarPeca(id, tipoId) {
  await sb.from('pecas').delete().eq('id', id);
  document.getElementById(`peca-row-${id}`)?.remove();
  const tipo = tiposCache.find(t => t.id === tipoId);
  if (tipo) tipo.pecas = tipo.pecas.filter(p => p.id !== id);
}

// ════════════════════════════════════════════════════
// PÁGINA: RESUMO & ANÁLISE
// ════════════════════════════════════════════════════
async function renderResumo() {
  if (!obraAtiva) { setLoading('<div class="alert alert-amber" style="margin:24px;"><span>⚠️</span><span>Selecione uma obra primeiro.</span></div>'); return; }
  setLoading();

  const [{ data: lajes }, { data: tipos }, { data: log }] = await Promise.all([
    sb.from('lajes').select('*').eq('obra_id', obraAtiva.id).order('ordem'),
    sb.from('tipos_laje').select('*, pecas(*)').eq('obra_id', obraAtiva.id),
    sb.from('logistica').select('*').eq('obra_id', obraAtiva.id).maybeSingle(),
  ]);

  const lajesData = lajes || [];
  const tiposData = tipos || [];
  const logAntes  = log?.dias_antes  ?? 3;
  const logDepois = log?.dias_depois ?? 5;

  // Taxa diária do primeiro tipo (ou zero)
  const taxaDiaria = tiposData.length > 0
    ? tiposData[0].pecas.reduce((s,p) => s + (p.quantidade||0)*(p.valor_dia||0), 0)
    : 0;

  // Calcular por laje
  let rows = [], totEsc=0, totReesc=0, totOcioso=0, totCiclo=0, totCustoC=0, totCustoO=0;
  lajesData.forEach(l => {
    const durCiclo  = (l.dias_esc||3) + (l.ini_reesc||7) + (l.dur_reesc||28);
    const durOcioso = logAntes + logDepois;
    const custoCiclo  = durCiclo  * taxaDiaria;
    const custoOcioso = durOcioso * taxaDiaria;
    totEsc    += l.dias_esc||3;
    totReesc  += l.dur_reesc||28;
    totOcioso += durOcioso;
    totCiclo  += durCiclo;
    totCustoC += custoCiclo;
    totCustoO += custoOcioso;
    rows.push({ l, durCiclo, durOcioso, custoCiclo, custoOcioso });
  });

  const valorContrato = obraAtiva.valor_total || 0;
  const saldo = valorContrato - totCustoC;
  const pctExec = valorContrato ? Math.min(100, (totCustoC / valorContrato * 100)) : 0;

  let semCor = 'green', semLabel = 'Dentro do orçamento', semDesc = 'Custo previsto abaixo do contrato.';
  if (saldo < 0) { semCor = 'red'; semLabel = 'Estouro de contrato'; semDesc = 'Custo supera o valor contratado.'; }
  else if (totCustoO > totCustoC * 0.25) { semCor = 'red'; semLabel = 'Alto custo ocioso'; semDesc = 'Tempo ocioso > 25% do custo de ciclo.'; }
  else if (saldo < valorContrato * 0.1) { semCor = 'amber'; semLabel = 'Saldo baixo'; semDesc = 'Saldo contratual abaixo de 10%.'; }

  let tblRows = rows.map(({ l, durCiclo, durOcioso, custoCiclo, custoOcioso }) => `
    <tr>
      <td><strong>${l.nome||'—'}</strong></td>
      <td>${l.pavimento||'—'}</td>
      <td style="font-family:var(--mono);font-size:12px;">${fmtDate(l.concretagem)}</td>
      <td class="num">${l.dias_esc||3}d</td>
      <td class="num">${l.dur_reesc||28}d</td>
      <td class="num" style="color:var(--amber)">${durOcioso}d</td>
      <td class="num">${durCiclo}d</td>
      <td class="num">${fmt(custoCiclo)}</td>
      <td class="num" style="color:var(--red)">${fmt(custoOcioso)}</td>
    </tr>`).join('');

  const maxCusto = Math.max(...rows.map(r => r.custoCiclo + r.custoOcioso), 1);
  const chartBars = rows.map(({ l, custoCiclo, custoOcioso }) => {
    const total = custoCiclo + custoOcioso;
    const pC = (custoCiclo / maxCusto * 88).toFixed(1);
    const pO = (custoOcioso / maxCusto * 88).toFixed(1);
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="width:120px;font-size:11px;color:var(--ink-soft);text-align:right;flex-shrink:0;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.nome}</div>
        <div style="flex:1;display:flex;height:18px;border-radius:3px;overflow:hidden;gap:1px;">
          <div style="width:${pC}%;background:#1d4ed8;height:100%;"></div>
          <div style="width:${pO}%;background:#fbbf24;height:100%;"></div>
        </div>
        <div style="width:90px;font-family:var(--mono);font-size:11px;text-align:right;">${fmt(total)}</div>
      </div>`;
  }).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="page-title">Resumo & Análise</div>
    <div class="page-sub">${obraAtiva.nome} · Contrato ${obraAtiva.contrato||'—'}</div>

    <div class="semaforo">
      <div class="semaforo-dot ${semCor}"></div>
      <div><span class="semaforo-label">${semLabel}</span><span class="semaforo-desc">— ${semDesc}</span></div>
    </div>

    <div class="kpi-row">
      <div class="kpi-box">
        <div class="kpi-label">Lajes Cadastradas</div>
        <div class="kpi-val">${lajesData.length}</div>
        <div class="kpi-sub">de ${obraAtiva.total_lajes||'—'} previstas</div>
      </div>
      <div class="kpi-box amber">
        <div class="kpi-label">Custo Total Ciclos</div>
        <div class="kpi-val" style="font-size:16px;">${fmt(totCustoC)}</div>
        <div class="kpi-sub">${totCiclo} dias de locação ativa</div>
      </div>
      <div class="kpi-box red">
        <div class="kpi-label">Custo Tempo Ocioso</div>
        <div class="kpi-val" style="font-size:16px;">${fmt(totCustoO)}</div>
        <div class="kpi-sub">${totOcioso} dias ociosos no total</div>
      </div>
      <div class="kpi-box green">
        <div class="kpi-label">Saldo Contratual</div>
        <div class="kpi-val" style="font-size:16px;color:${saldo>=0?'var(--green)':'var(--red)'};">${fmt(saldo)}</div>
        <div class="kpi-sub">${pctExec.toFixed(1)}% estimado</div>
      </div>
    </div>

    <div class="result-block">
      <h3>Previsão Financeira</h3>
      <div class="result-row"><span class="result-key">Valor Total Contrato</span><span class="result-val">${fmt(valorContrato)}</span></div>
      <div class="result-row"><span class="result-key">Frete</span><span class="result-val">${fmt(obraAtiva.frete)}</span></div>
      <div class="result-row"><span class="result-key">Custo ciclos (esc. + reesc.)</span><span class="result-val">${fmt(totCustoC)}</span></div>
      <div class="result-row"><span class="result-key">Custo tempo ocioso (logística)</span><span class="result-val vred">${fmt(totCustoO)}</span></div>
      <div class="result-row"><span class="result-key">Total Geral Previsto</span><span class="result-val highlight">${fmt(totCustoC+totCustoO)}</span></div>
      <div class="result-row"><span class="result-key">Saldo Contratual</span><span class="result-val ${saldo>=0?'vgreen':'vred'}">${fmt(saldo)}</span></div>
      <div class="prog-wrap" style="margin-top:14px;"><div class="prog-bar" style="width:${pctExec.toFixed(1)}%;"></div></div>
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.35);margin-top:4px;">${pctExec.toFixed(1)}% do contrato estimado</div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-head-title">📋 Detalhamento por Laje</span></div>
      <div class="card-body" style="padding:0;">
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr>
              <th>Laje</th><th>Pavimento</th><th>Concretagem</th>
              <th>Esc. (d)</th><th>Reesc. (d)</th><th>Ocioso (d)</th>
              <th>Total (d)</th><th>Custo Ciclo</th><th>Custo Ocioso</th>
            </tr></thead>
            <tbody>${tblRows || '<tr><td colspan="9" style="text-align:center;color:var(--ink-soft);padding:20px;">Nenhuma laje cadastrada</td></tr>'}</tbody>
            <tfoot><tr>
              <td colspan="3">TOTAL</td>
              <td class="num">${totEsc}d</td>
              <td class="num">${totReesc}d</td>
              <td class="num">${totOcioso}d</td>
              <td class="num">${totCiclo + totOcioso}d</td>
              <td class="num">${fmt(totCustoC)}</td>
              <td class="num">${fmt(totCustoO)}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-head-title">📊 Composição do Custo por Laje</span>
        <span style="font-size:11px;color:var(--ink-soft);">
          <span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;"><span style="width:10px;height:10px;background:#1d4ed8;border-radius:2px;display:inline-block;"></span> Ciclo</span>
          <span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#fbbf24;border-radius:2px;display:inline-block;"></span> Ocioso</span>
        </span>
      </div>
      <div class="card-body">${chartBars || '<p style="color:var(--ink-soft);font-size:13px;">Nenhuma laje com dados.</p>'}</div>
    </div>

    <div style="margin-top:8px;">
      <button class="btn btn-ghost" onclick="navegar('pecas')">← Peças</button>
    </div>`;
}

// ════════════════════════════════════════════════════
// INIT — chamado pelo loader após Supabase carregar
// ════════════════════════════════════════════════════
async function checarSessao() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) iniciarApp(session.user);
  } catch(e) {
    console.error('Erro ao checar sessão:', e);
  }
}

document.addEventListener('DOMContentLoaded', () => checarSessao());
</script>


</body></html>
